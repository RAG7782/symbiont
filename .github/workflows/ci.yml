name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -q --asyncio-mode=auto --tb=short

      - name: Check version consistency
        run: |
          PYPROJECT_VER=$(python -c "import tomllib; d=tomllib.loads(open('pyproject.toml').read()); print(d['project']['version'])")
          INIT_VER=$(uv run python -c "import symbiont; print(symbiont.__version__)")
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "Version mismatch: pyproject=$PYPROJECT_VER init=$INIT_VER"
            exit 1
          fi
          echo "Version OK: $PYPROJECT_VER"
